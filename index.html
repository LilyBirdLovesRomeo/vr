<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Charisse VR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
</head>

<body>
<a-scene>
    <a-assets>
        <img id="Hoop" src="images/Hoop.JPG" preload="auto">
        <img id="Leo1" src="images/Leo1.jpeg" preload="auto">
        <img id="sarge1" src="images/Sarge1.jpeg" preload="auto">
        <img id="sarge2" src="images/Sarge2.jpeg" preload="auto">
        <img id="leo2" src="images/Leo2.jpeg" preload="auto">
    </a-assets>
    <a-entity environment="preset: moon; dressingAmount: 800; skyColor: #bde0fe;"></a-entity>
    <!--Start of Museum-->
    <a-cylinder id="floor" position="0 0 0" radius="7.5" height="0.1" color='#ff758f'></a-cylinder>
    <a-box id="wall1" position="0 1.473 4.907" scale="10 3 0.1" color="pink"></a-box>
    <a-box id="wall2" position="0 1.473 -4.907" scale="10 3 0.1" color="pink"></a-box>
    <a-box id="wall3" position="5.049 1.454 -0.008" rotation="0 -90 0" scale="10 3 0.1" color="pink"></a-box>
    <a-box id="wall4" position="-5.049 1.454 -0.008" rotation="0 -90 0" scale="10 3 0.1" color="#ffa3a5"></a-box>
    <a-cylinder id="triangle_front" segments-radial="3" position="0 3.874 4.907" rotation="-90 0 0" scale="5.774 0.2 1.8" color="pink"></a-cylinder>
    <a-cylinder id="triangle_back" segments-radial="3" position="0 3.874 -4.907" rotation="-90 0 0" scale="5.774 0.2 1.8" color="pink"></a-cylinder>
    <a-box id="roof_right" position="2.580 4.328 0" rotation="28.433 90 0" scale="10.931 0.20 6.110" color="pink"></a-box>
    <a-box id="roof_left" position="-2.599 4.321 -0.017" rotation="28.433 -90 0" scale="10.931 0.20 6.130" color="pink"></a-box>

    <a-plane id="art1" src="#Hoop" scale="2 2 0.05" rotation="0 0 0" position="-2.835 1.690 -4.834"></a-plane>
    <a-plane id="art2" src="#Leo1" scale="2 2 0.05" rotation="0 0 90" position="0.103 1.690 -4.834"></a-plane>
    <a-plane id="art3" src="#sarge1" scale="2 2 0.05" rotation="0 0 0" position="2.943 1.690 -4.834"></a-plane>
    <a-plane id="art4" src="#sarge2" scale="2 2 0.05" rotation="0 0 0" position="2.943 1.690 -4.834"></a-plane> 
    <a-plane id="art5" src="#leo2" scale="2 2 0.05" rotation="0 90 0" position="-4.147 1.704 -2.623"></a-plane>
</a-scene>
</body>
</html>
